services:
  interview-app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Next.js 的 NEXT_PUBLIC_* 变量需要在构建时可用
        - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-}
    container_name: v0-interview-app
    ports:
      - "127.0.0.1:3001:3000"  # 仅本机监听；公网经 nginx 反代访问，避免直连绕过 nginx
    env_file:
      - .env.production  # 所有环境变量
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://127.0.0.1:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  postgres:
    image: postgres:15-alpine
    container_name: v0-interview-postgres
    env_file:
      - .env.production
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./prisma:/docker-prisma  # 挂载 Prisma 文件以便初始化
    ports:
      - "127.0.0.1:5433:5432"  # 仅本机监听；数据库不对公网暴露（应用经 docker 内网 postgres:5432 访问）
    restart: unless-stopped
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local

networks:
  app-network:
    driver: bridge

